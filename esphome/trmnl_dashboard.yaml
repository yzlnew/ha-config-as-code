esphome:
  name: trmnl
  friendly_name: TRMNL

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

logger:

api:
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    - delay: 5s
    - component.update: main_display

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.50.135
    gateway: 192.168.50.1
    subnet: 255.255.255.0
  ap:
    ssid: "Trmnl Fallback Hotspot"
    password: !secret ap_password

captive_portal:

time:
  - platform: homeassistant
    id: ha_time

font:
  # 48px - clock
  - file: "fonts/fusion-pixel-12px-proportional-zh_hans.ttf"
    id: font_clock
    size: 48
    glyphs: "0123456789:"

  # 32px - date
  - file: "fonts/fusion-pixel-12px-proportional-zh_hans.ttf"
    id: font_date
    size: 32
    glyphs: "0123456789年月日 周一二三四五六天"

  # 24px - main text with MDI icons
  - file: "fonts/fusion-pixel-12px-proportional-zh_hans.ttf"
    id: font_large
    size: 24
    glyphs: "0123456789.:-°%/ ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz客厅晴多云阴小中大雨雪雾霾雷阵暴沙尘浮风冰雹天气温湿度体感甲醛₂₅₁₀今明后一二三四五六周日正常缺满砂水锁电量芯效碳素全门饮机猫厕所净化器"
    extras:
      - file: "fonts/materialdesignicons-webfont.ttf"
        glyphs:
          - "\U000F0590"  # mdi-weather-sunny
          - "\U000F0595"  # mdi-weather-cloudy
          - "\U000F0597"  # mdi-weather-rainy
          - "\U000F0598"  # mdi-weather-pouring
          - "\U000F0F36"  # mdi-weather-snowy-heavy
          - "\U000F0591"  # mdi-weather-fog
          - "\U000F067E"  # mdi-weather-lightning-rainy
          - "\U000F059D"  # mdi-weather-windy
          - "\U000F0596"  # mdi-weather-hail
